name: Bug report
description: Report incorrect output or broken behavior
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: input
    attributes:
      label: Input data
      description: Use fictional or sanitized field data only.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected output
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual output
    validations:
      required: true

